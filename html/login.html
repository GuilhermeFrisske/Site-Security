<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <a href="/html/index.html" class="btn-back">
        <span class="arrow">←</span> Voltar
    </a>
    <div class="bg-glow"></div>
    <canvas id="data-bg"></canvas>

    <div class="auth-container">
        <div class="auth-card">
            <div class="security-badge">
                <div class="shield-icon"></div>
            </div>
            
            <h2>Acesso<span>.</span></h2>
            <p>Identifique-se para descriptografar o painel.</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="email" id="email" placeholder="E-mail" required>
                    <div class="input-line"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Chave de Acesso" required>
                    <div class="input-line"></div>
                </div>
                
                <button type="submit" class="btn-main">Autenticar</button>
            </form>
            
            <div class="auth-footer">
                <a href="cadastro.html" class="toggle-link">Solicitar acesso (Novo Usuário)</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('data-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "0101010101ABCDEF";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(2, 6, 23, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#6366f1";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 50);

        function handleLogin(e) {
            e.preventDefault();
            const card = document.querySelector('.auth-card');
            card.style.transform = "scale(0.95)";
            card.style.opacity = "0.5";
            
            setTimeout(() => {
                alert('Acesso autorizado. Bem-vindo, Agente.');
                window.location.href = 'index.html';
            }, 800);
        }
    </script>
</body>
</html>
